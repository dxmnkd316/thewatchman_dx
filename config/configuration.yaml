# https://www.home-assistant.io/integrations/default_config/
#default_config:

# https://www.home-assistant.io/integrations/homeassistant/
homeassistant:
  debug: true

# https://www.home-assistant.io/integrations/logger/
logger:
  default: info
  logs:
    custom_components.watchman_dx: debug
  filters:
    custom_components.watchman_dx:
      - "^:U.*" # check DebugLogger class from .utils for more info on filtering
      - "^:T.*"
      - "^:M.*"
    custom_components.watchman_dx.coordinator:
      - "^:U.*"
      - "^:T.*"
      - "^:M.*"
    custom_components.watchman_dx.utils:
      - "^:U.*"
      #- "^:T.*"
      - "^:M.*"
    custom_components.watchman_dx.sensor:
      - "^:U.*"
      - "^:T.*"
      - "^:M.*"
    custom_components.watchman_dx.entity:
      - "^:U.*"
      - "^:T.*"
      - "^:M.*"
    custom_components.watchman_dx.config_flow:
      - "^:U.*"
      - "^:T.*"
      - "^:M.*"
